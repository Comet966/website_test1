<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片加密/解密</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #ccc;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
        }
        .tab.active {
            border-bottom: 2px solid #4CAF50;
            color: #4CAF50;
            font-weight: bold;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .image-box {
            flex: 1;
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
        }
        .image-box h3 {
            margin-top: 0;
        }
        .image-box input[type="file"] {
            margin: 10px 0;
        }
        .preview {
            max-width: 100%;
            max-height: 250px;
            margin-top: 10px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background-color: #f5f5f5;
            display: none;
        }
        .result h3 {
            margin-top: 0;
        }
        .result img {
            max-width: 100%;
            max-height: 300px;
        }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin: 10px 5px 0 0;
        }
        .download-btn:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>
    <h1>图片加密/解密工具</h1>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('encode')">加密</button>
        <button class="tab" onclick="switchTab('decode')">解密</button>
    </div>

    <!-- 加密部分 -->
    <div id="encode" class="tab-content active">
        <div class="container">
            <div class="image-box">
                <h3>原图 (Image A)</h3>
                <input type="file" id="imageA" accept="image/*">
                <img id="previewA" class="preview" style="display:none;">
            </div>
        </div>
        <button id="encodeBtn" onclick="encode()">生成加密图片和密钥</button>

        <div class="result" id="encodeResult">
            <h3>加密结果</h3>
            <div class="container">
                <div class="image-box">
                    <h3>加密图片</h3>
                    <img id="encImage" src="" alt="加密图片">
                    <br>
                    <a id="downloadEnc" class="download-btn" href="#" download="encrypted.png">下载加密图片</a>
                </div>
                <div class="image-box">
                    <h3>密钥图片 (Key)</h3>
                    <img id="keyImage" src="" alt="密钥图片">
                    <br>
                    <a id="downloadKey" class="download-btn" href="#" download="key.png">下载密钥</a>
                </div>
            </div>
            <p><strong>重要：</strong>请妥善保存密钥图片，解密时需要同时上传加密图片和密钥图片。</p>
        </div>
    </div>

    <!-- 解密部分 -->
    <div id="decode" class="tab-content">
        <div class="container">
            <div class="image-box">
                <h3>加密图片</h3>
                <input type="file" id="encryptedImage" accept="image/*">
                <img id="previewEnc" class="preview" style="display:none;">
            </div>
            <div class="image-box">
                <h3>密钥图片</h3>
                <input type="file" id="keyImageInput" accept="image/*">
                <img id="previewKey" class="preview" style="display:none;">
            </div>
        </div>
        <button id="decodeBtn" onclick="decode()">解密</button>

        <div class="result" id="decodeResult">
            <h3>解密结果</h3>
            <img id="decImage" src="" alt="解密图片">
            <br>
            <a id="downloadDec" class="download-btn" href="#" download="decrypted.png">下载解密图片</a>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // 加密部分预览
        document.getElementById('imageA').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewA').src = e.target.result;
                    document.getElementById('previewA').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // 解密部分预览 - 加密图片
        document.getElementById('encryptedImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewEnc').src = e.target.result;
                    document.getElementById('previewEnc').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // 解密部分预览 - 密钥图片
        document.getElementById('keyImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewKey').src = e.target.result;
                    document.getElementById('previewKey').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        function encode() {
            const imageA = document.getElementById('imageA').files[0];

            if (!imageA) {
                alert('请上传图片');
                return;
            }

            const formData = new FormData();
            formData.append('imageA', imageA);

            const btn = document.getElementById('encodeBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';

            fetch('/encode/encode/', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.textContent = '生成加密图片和密钥';

                if (data.success) {
                    document.getElementById('encodeResult').style.display = 'block';
                    document.getElementById('encImage').src = data.encrypted_image;
                    document.getElementById('keyImage').src = data.key_image;
                    document.getElementById('downloadEnc').href = data.encrypted_image;
                    document.getElementById('downloadKey').href = data.key_image;
                } else {
                    alert(data.error || '加密失败');
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.textContent = '生成加密图片和密钥';
                alert('请求失败: ' + error);
            });
        }

        function decode() {
            const encryptedImage = document.getElementById('encryptedImage').files[0];
            const keyImage = document.getElementById('keyImageInput').files[0];

            if (!encryptedImage || !keyImage) {
                alert('请上传加密图片和密钥图片');
                return;
            }

            const formData = new FormData();
            formData.append('encryptedImage', encryptedImage);
            formData.append('keyImage', keyImage);

            const btn = document.getElementById('decodeBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';

            fetch('/encode/decode/', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.textContent = '解密';

                if (data.success) {
                    document.getElementById('decodeResult').style.display = 'block';
                    document.getElementById('decImage').src = data.decrypted_image;
                    document.getElementById('downloadDec').href = data.decrypted_image;
                } else {
                    alert(data.error || '解密失败');
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.textContent = '解密';
                alert('请求失败: ' + error);
            });
        }
    </script>
</body>
</html>
