<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: #007bff;
            background: #f8f9fa;
        }
        .upload-area.dragover {
            border-color: #007bff;
            background: #e7f3ff;
        }
        .upload-icon {
            font-size: 48px;
            color: #999;
            margin-bottom: 10px;
        }
        .upload-text {
            color: #666;
            font-size: 14px;
        }
        #fileInput {
            display: none;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #007bff;
        }
        .preview {
            margin-top: 20px;
            display: none;
        }
        .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .result a {
            color: #007bff;
            word-break: break-all;
        }
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav a {
            color: #007bff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            background: #e7f3ff;
            transition: background 0.3s;
        }
        .nav a:hover {
            background: #d0e7ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片上传</h1>
        <div class="nav">
            <a href="/upload/">上传图片</a>
            <a href="/upload/show/">查看图片</a>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽图片到此处上传</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="preview" id="preview">
            <img id="previewImg" src="" alt="预览">
        </div>

        <div class="form-group">
            <label for="name">图片名称（可选）</label>
            <input type="text" id="name" placeholder="请输入图片名称">
        </div>

        <button class="btn" id="submitBtn">上传图片</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const submitBtn = document.getElementById('submitBtn');
        const result = document.getElementById('result');
        const nameInput = document.getElementById('name');

        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                showPreview(file);
            }
        });

        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                fileInput.files = e.dataTransfer.files;
                showPreview(file);
            }
        });

        // 预览图片
        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 上传图片
        submitBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) {
                showResult('请先选择图片', false);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '上传中...';

            const formData = new FormData();
            formData.append('image', file);
            formData.append('name', nameInput.value);

            try {
                const response = await fetch('/upload/api/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showResult(`上传成功！<br>图片地址：<a href="${data.data.url}" target="_blank">${data.data.url}</a>`, true);
                    // 清空表单
                    fileInput.value = '';
                    nameInput.value = '';
                    preview.style.display = 'none';
                } else {
                    showResult(data.error || '上传失败', false);
                }
            } catch (err) {
                showResult('上传失败，请重试', false);
            }

            submitBtn.disabled = false;
            submitBtn.textContent = '上传图片';
        });

        function showResult(message, isSuccess) {
            result.innerHTML = message;
            result.className = 'result ' + (isSuccess ? 'success' : 'error');
            result.style.display = 'block';
        }
    </script>
</body>
</html>
