<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片列表</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .image-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .image-item {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .image-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .image-info {
            padding: 10px;
        }
        .image-name {
            font-weight: 500;
            color: #333;
        }
        .image-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片列表</h1>
        <div class="image-list">
            {% for image in images %}
            <div class="image-item">
                <img src="{{ image.image.url }}" alt="{{ image.name }}">
                <div class="image-info">
                    <div class="image-name">{{ image.name|default:'未命名' }}</div>
                    <div class="image-time">{{ image.uploaded_at|date:"Y-m-d H:i" }}</div>
                </div>
            </div>
            {% empty %}
            <p style="text-align: center; color: #999;">暂无图片</p>
            {% endfor %}
        </div>
        <a href="/upload/" class="back-link">返回上传页面</a>
    </div>
</body>
</html>
